[pytest]
# ── Discovery ─────────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output ────────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# ── Markers ───────────────────────────────────────────────────────────────────
markers =
    unit: fast, isolated unit tests (no API calls, no disk I/O)
    integration: tests that call real external services (skipped in CI by default)
    slow: tests that take more than 2 seconds

# ── Coverage (run with: pytest --cov=. --cov-report=html) ────────────────────
# Install pytest-cov: pip install pytest-cov

# ── Logging ───────────────────────────────────────────────────────────────────
log_cli = true
log_cli_level = WARNING
log_format = %(asctime)s %(levelname)s %(name)s: %(message)s
