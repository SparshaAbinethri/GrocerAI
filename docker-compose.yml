version: "3.9"

services:
  grocerai:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: grocerai_app
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      # Persist FAISS index and user preferences across container restarts
      - grocerai_data:/app/data
    environment:
      - FAISS_INDEX_PATH=/app/data/faiss_index
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  grocerai_data:
    driver: local
