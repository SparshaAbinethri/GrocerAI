name: CI — Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Run tests
  # Blocks deploy if tests fail
  # ---------------------------------------------------------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          ENVIRONMENT: test
          SENTRY_DSN: ""        # Disable Sentry during tests
          LOG_LEVEL: WARNING    # Reduce log noise during tests

  # ---------------------------------------------------------------------------
  # Job 2: Confirm deployment
  # Railway auto-deploys when tests pass and code hits main branch.
  # This job just logs that the deploy was triggered.
  # ---------------------------------------------------------------------------
  confirm-deploy:
    name: Confirm Railway Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Log deployment trigger
        run: |
          echo "✅ All tests passed."
          echo "🚀 Railway is deploying commit ${{ github.sha }} to production."
          echo "🔗 Monitor at: https://railway.app/dashboard"
